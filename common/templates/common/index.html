{% extends 'common/_main.html' %} {% load static %} {% block content %}
<main
  id="app"
  class="flex-1 flex flex-col items-center text-white relative overflow-y-auto"
>
  <div class="w-full max-w-[560px] px-6 pt-8 pb-28 flex-1">
    <!-- Queue Header -->
    <div class="flex items-start justify-between mb-8">
      <div>
        <img
          src="{% static 'img/logo-rect_no-bg.png' %}"
          alt="DayChron"
          class="h-6"
        />
        <p id="queue-stats" class="text-[13px] text-neutral-500 mt-1">
          No tasks queued.
        </p>
      </div>
      <div class="flex items-center gap-3 relative">
        <button
          onclick="navigateDay(-1)"
          class="text-neutral-500 hover:text-neutral-300 text-xl px-1 transition-colors"
          aria-label="Previous day"
        >
          &#8249;
        </button>
        <button
          id="btn-today"
          onclick="toggleCalendar()"
          class="flex items-center gap-1.5 text-cyan-400 text-sm font-medium hover:text-cyan-300 transition-colors"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <path d="M16 2v4M8 2v4M3 10h18" />
          </svg>
          <span id="date-label">Today</span>
        </button>
        <button
          onclick="navigateDay(1)"
          class="text-neutral-500 hover:text-neutral-300 text-xl px-1 transition-colors"
          aria-label="Next day"
        >
          &#8250;
        </button>

        <div
          id="calendar-dropdown"
          class="hidden absolute top-10 right-0 bg-[#1c1c20] rounded-xl shadow-2xl border border-neutral-700/50 p-4 z-50 select-none"
          style="width: 280px"
        ></div>
      </div>
    </div>

    <!-- Dynamic Content -->
    <div id="queue-content"></div>
  </div>

  <!-- Fixed Bottom Bar -->
  <div
    class="fixed bottom-0 left-0 right-0 bg-[#0c0c0e] border-t border-neutral-800/60 z-40"
  >
    <div class="max-w-[560px] mx-auto px-6 py-5">
      <div id="add-task-bar">
        <button
          onclick="showAddTask()"
          class="flex items-center gap-3 text-neutral-500 hover:text-neutral-300 transition-colors w-full text-left"
        >
          <span class="text-xl font-light leading-none">+</span>
          <span class="text-[15px]">Add a task...</span>
        </button>
      </div>
    </div>
  </div>
</main>

<script>
  (function () {
    const FOCUS_MINUTES = 25;
    const todayDate = new Date();
    todayDate.setHours(0, 0, 0, 0);

    let tasks = [];
    let nextId = 1;
    let timer = { min: FOCUS_MINUTES, sec: 0, running: false, interval: null };
    let viewDate = new Date(todayDate);
    let calendarOpen = false;
    let calendarMonth = new Date(
      todayDate.getFullYear(),
      todayDate.getMonth(),
      1,
    );

    function currentTask() {
      return tasks.find(function (t) {
        return !t.completed;
      });
    }

    function pendingTasks() {
      return tasks.filter(function (t) {
        return !t.completed;
      });
    }

    function completedTasks() {
      return tasks.filter(function (t) {
        return t.completed;
      });
    }

    function totalFocusMinutes() {
      return pendingTasks().length * FOCUS_MINUTES;
    }

    function formatFocusTime(minutes) {
      if (minutes < 60) return minutes + "m";
      var h = Math.floor(minutes / 60);
      var m = minutes % 60;
      return m > 0 ? h + "h " + m + "m" : h + "h";
    }

    function pad(n) {
      return n < 10 ? "0" + n : "" + n;
    }

    function isToday(date) {
      return (
        date.getFullYear() === todayDate.getFullYear() &&
        date.getMonth() === todayDate.getMonth() &&
        date.getDate() === todayDate.getDate()
      );
    }

    function isSameDay(a, b) {
      return (
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate()
      );
    }

    function formatDateLabel(date) {
      if (isToday(date)) return "Today";
      return date.toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
      });
    }

    function escapeHtml(text) {
      var div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // --- Rendering ---

    function render() {
      renderStats();
      renderDateLabel();
      renderContent();
      renderCalendar();
    }

    function renderStats() {
      var el = document.getElementById("queue-stats");
      var pending = pendingTasks();
      if (pending.length === 0 && completedTasks().length === 0) {
        el.textContent = "No tasks queued.";
      } else if (pending.length === 0) {
        el.textContent = "All tasks completed!";
      } else {
        var focus = formatFocusTime(totalFocusMinutes());
        el.textContent =
          pending.length +
          " task" +
          (pending.length !== 1 ? "s" : "") +
          " remaining. " +
          focus +
          " of focus.";
      }
    }

    function renderDateLabel() {
      document.getElementById("date-label").textContent =
        formatDateLabel(viewDate);
    }

    function renderContent() {
      var container = document.getElementById("queue-content");
      var pending = pendingTasks();
      var completed = completedTasks();
      var current = currentTask();

      if (pending.length === 0 && completed.length === 0) {
        container.innerHTML = renderEmptyState();
        return;
      }

      var html = "";

      if (current) {
        html += renderTimerCard(current);
      }

      var upNext = pending.slice(1);
      if (upNext.length > 0) {
        html += '<div class="mt-8">';
        html +=
          '<h2 class="text-[11px] font-semibold tracking-[0.15em] text-neutral-500 uppercase mb-4">Up Next</h2>';
        html += '<div class="divide-y divide-neutral-800/60">';
        for (var i = 0; i < upNext.length; i++) {
          html +=
            '<div class="py-4 text-[15px] text-neutral-300">' +
            escapeHtml(upNext[i].title) +
            "</div>";
        }
        html += "</div></div>";
      }

      if (completed.length > 0) {
        html += '<div class="mt-10">';
        html +=
          '<h2 class="text-[11px] font-semibold tracking-[0.15em] text-neutral-500 uppercase mb-4">Completed &middot; ' +
          completed.length +
          "</h2>";
        html += '<div class="divide-y divide-neutral-800/60">';
        for (var j = 0; j < completed.length; j++) {
          html += '<div class="py-3 flex items-center gap-3">';
          html +=
            '<svg class="w-5 h-5 text-emerald-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>';
          html +=
            '<span class="text-[15px] text-neutral-500 line-through">' +
            escapeHtml(completed[j].title) +
            "</span>";
          html += "</div>";
        }
        html += "</div></div>";
      }

      container.innerHTML = html;
    }

    function renderEmptyState() {
      return (
        '<div class="flex flex-col items-center justify-center" style="padding-top: 30vh;">' +
        '<p class="text-[1.65rem] font-semibold text-neutral-600">Do the next thing.</p>' +
        '<p class="text-sm text-neutral-600 mt-2">Add a task below to begin.</p>' +
        "</div>"
      );
    }

    function renderTimerCard(task) {
      var playIcon = timer.running
        ? '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>'
        : '<svg class="w-5 h-5 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';

      return (
        '<div class="bg-[#151517] rounded-2xl px-8 pt-10 pb-8 border border-neutral-800/40">' +
        '<div class="text-center">' +
        '<div class="font-mono text-[5.5rem] leading-none font-bold text-cyan-400 tracking-tight">' +
        pad(timer.min) +
        '<span class="text-cyan-400/50 mx-1">:</span>' +
        pad(timer.sec) +
        "</div>" +
        '<p class="text-base text-neutral-300 mt-5 font-medium">' +
        escapeHtml(task.title) +
        "</p>" +
        '<div class="flex items-center justify-center gap-4 mt-6">' +
        '<button onclick="window._queue.toggleTimer()" class="w-12 h-12 rounded-xl bg-neutral-800/50 border border-neutral-700/30 flex items-center justify-center text-neutral-400 hover:text-white hover:bg-neutral-700/60 transition-all">' +
        playIcon +
        "</button>" +
        '<button onclick="window._queue.completeCurrentTask()" class="w-12 h-12 rounded-xl bg-neutral-800/50 border border-neutral-700/30 flex items-center justify-center text-cyan-400 hover:text-cyan-300 hover:bg-neutral-700/60 transition-all">' +
        '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>' +
        "</button>" +
        "</div>" +
        "</div>" +
        "</div>"
      );
    }

    function renderCalendar() {
      var dropdown = document.getElementById("calendar-dropdown");
      if (!calendarOpen) {
        dropdown.classList.add("hidden");
        return;
      }
      dropdown.classList.remove("hidden");

      var year = calendarMonth.getFullYear();
      var month = calendarMonth.getMonth();
      var monthName = calendarMonth.toLocaleDateString("en-US", {
        month: "long",
        year: "numeric",
      });

      var firstDay = new Date(year, month, 1).getDay();
      var daysInMonth = new Date(year, month + 1, 0).getDate();
      var daysInPrevMonth = new Date(year, month, 0).getDate();

      var html =
        '<div class="flex items-center justify-between mb-3">' +
        '<button onclick="window._queue.changeCalendarMonth(-1)" class="text-neutral-400 hover:text-white p-1 transition-colors">' +
        '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7"/></svg>' +
        "</button>" +
        '<span class="text-sm font-medium text-neutral-200">' +
        monthName +
        "</span>" +
        '<button onclick="window._queue.changeCalendarMonth(1)" class="text-neutral-400 hover:text-white p-1 transition-colors">' +
        '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5l7 7-7 7"/></svg>' +
        "</button>" +
        "</div>";

      html +=
        '<div class="grid grid-cols-7 text-center text-[11px] text-neutral-500 mb-2">';
      var dayNames = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
      for (var i = 0; i < dayNames.length; i++) {
        html += '<div class="py-1">' + dayNames[i] + "</div>";
      }
      html += "</div>";

      html += '<div class="grid grid-cols-7 text-center text-sm">';

      for (var p = firstDay - 1; p >= 0; p--) {
        var prevDay = daysInPrevMonth - p;
        html +=
          '<button onclick="window._queue.selectCalendarDate(' +
          year +
          "," +
          (month - 1) +
          "," +
          prevDay +
          ')" class="py-1.5 text-neutral-600 hover:text-neutral-400 rounded-lg transition-colors">' +
          prevDay +
          "</button>";
      }

      for (var d = 1; d <= daysInMonth; d++) {
        var dateObj = new Date(year, month, d);
        var isTodayD = isToday(dateObj);
        var isSelected = isSameDay(dateObj, viewDate) && !isTodayD;
        var cls = "py-1.5 rounded-lg transition-colors ";
        if (isTodayD) {
          cls += "bg-cyan-500 text-white font-semibold";
        } else if (isSelected) {
          cls += "bg-neutral-700 text-white";
        } else {
          cls += "text-neutral-300 hover:bg-neutral-700/50";
        }
        html +=
          '<button onclick="window._queue.selectCalendarDate(' +
          year +
          "," +
          month +
          "," +
          d +
          ')" class="' +
          cls +
          '">' +
          d +
          "</button>";
      }

      var totalCells = firstDay + daysInMonth;
      var remaining = (7 - (totalCells % 7)) % 7;
      for (var n = 1; n <= remaining; n++) {
        html +=
          '<button onclick="window._queue.selectCalendarDate(' +
          year +
          "," +
          (month + 1) +
          "," +
          n +
          ')" class="py-1.5 text-neutral-600 hover:text-neutral-400 rounded-lg transition-colors">' +
          n +
          "</button>";
      }

      html += "</div>";
      dropdown.innerHTML = html;
    }

    // --- Actions ---

    function toggleTimer() {
      if (timer.running) {
        pauseTimer();
      } else {
        startTimer();
      }
      render();
    }

    function startTimer() {
      if (!currentTask()) return;
      timer.running = true;
      timer.interval = setInterval(function () {
        if (timer.sec > 0) {
          timer.sec--;
        } else if (timer.min > 0) {
          timer.min--;
          timer.sec = 59;
        } else {
          pauseTimer();
        }
        render();
      }, 1000);
    }

    function pauseTimer() {
      timer.running = false;
      if (timer.interval) {
        clearInterval(timer.interval);
        timer.interval = null;
      }
    }

    function resetTimer() {
      pauseTimer();
      timer.min = FOCUS_MINUTES;
      timer.sec = 0;
    }

    function completeCurrentTask() {
      var task = currentTask();
      if (!task) return;
      task.completed = true;
      resetTimer();
      render();
    }

    function addTask(title) {
      tasks.push({ id: nextId++, title: title, completed: false });
      render();
    }

    function navigateDay(offset) {
      viewDate = new Date(
        viewDate.getFullYear(),
        viewDate.getMonth(),
        viewDate.getDate() + offset,
      );
      calendarMonth = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
      render();
    }

    function toggleCalendar() {
      calendarOpen = !calendarOpen;
      if (calendarOpen) {
        calendarMonth = new Date(
          viewDate.getFullYear(),
          viewDate.getMonth(),
          1,
        );
      }
      render();
    }

    function changeCalendarMonth(offset) {
      calendarMonth = new Date(
        calendarMonth.getFullYear(),
        calendarMonth.getMonth() + offset,
        1,
      );
      render();
    }

    function selectCalendarDate(year, month, day) {
      viewDate = new Date(year, month, day);
      calendarMonth = new Date(year, month, 1);
      calendarOpen = false;
      render();
    }

    function showAddTask() {
      var bar = document.getElementById("add-task-bar");
      bar.innerHTML =
        '<div class="flex items-center gap-3">' +
        '<span class="text-xl font-light text-neutral-500 leading-none">+</span>' +
        '<input id="new-task-input" type="text" placeholder="Task name..." ' +
        'class="flex-1 bg-transparent text-[15px] text-white placeholder-neutral-600 outline-none border-none" />' +
        "</div>";
      var input = document.getElementById("new-task-input");
      input.focus();
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && input.value.trim()) {
          addTask(input.value.trim());
          resetAddBar();
        } else if (e.key === "Escape") {
          resetAddBar();
        }
      });
      input.addEventListener("blur", function () {
        setTimeout(resetAddBar, 150);
      });
    }

    function resetAddBar() {
      var bar = document.getElementById("add-task-bar");
      if (!bar) return;
      bar.innerHTML =
        '<button onclick="window._queue.showAddTask()" class="flex items-center gap-3 text-neutral-500 hover:text-neutral-300 transition-colors w-full text-left">' +
        '<span class="text-xl font-light leading-none">+</span>' +
        '<span class="text-[15px]">Add a task...</span>' +
        "</button>";
    }

    // Expose functions for inline onclick handlers
    window._queue = {
      toggleTimer: toggleTimer,
      completeCurrentTask: completeCurrentTask,
      showAddTask: showAddTask,
      changeCalendarMonth: changeCalendarMonth,
      selectCalendarDate: selectCalendarDate,
    };

    // Global functions for template onclick handlers
    window.navigateDay = navigateDay;
    window.toggleCalendar = toggleCalendar;
    window.showAddTask = showAddTask;

    // Close calendar on outside click
    document.addEventListener("click", function (e) {
      if (!calendarOpen) return;
      var dropdown = document.getElementById("calendar-dropdown");
      var todayBtn = document.getElementById("btn-today");
      if (!dropdown.contains(e.target) && !todayBtn.contains(e.target)) {
        calendarOpen = false;
        render();
      }
    });

    render();
  })();
</script>
{% endblock %}
