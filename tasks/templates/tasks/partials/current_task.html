<div
  x-data="timer({{ task.total_elapsed_seconds }}, {{ task.is_running|yesno:'true,false' }}, '{% url "tasks:task-detail" task.id %}')"
  class="bg-gradient-to-b from-[#1e1e22] to-[#151517] rounded-2xl px-8 pt-10 pb-8 border border-neutral-600/25 shadow-xl shadow-black/30 relative"
>

  <div x-show="running" x-cloak class="absolute top-5 right-5">
    <span class="relative flex h-2.5 w-2.5">
      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
      <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-cyan-400"></span>
    </span>
  </div>

  <div class="text-center">
    <div class="font-mono text-[5.5rem] leading-none font-bold tracking-tight transition-colors"
         :class="running ? 'text-cyan-400' : 'text-neutral-500'">
      <span x-text="mm"></span><span class="mx-1" :class="running ? 'text-cyan-400/40' : 'text-neutral-600'">:</span><span x-text="ss"></span>
    </div>

    <p class="text-base text-neutral-300 mt-5 font-medium">{{ task.name }}</p>

    <div class="flex items-center justify-center gap-3 mt-7">
      <button @click="toggle()"
              class="w-12 h-12 rounded-xl border flex items-center justify-center transition-all"
              :class="running
                ? 'bg-cyan-500/15 border-cyan-500/25 text-cyan-400 hover:bg-cyan-500/25'
                : 'bg-neutral-800/50 border-neutral-700/30 text-neutral-400 hover:text-white hover:bg-neutral-700/60'">
        <svg x-show="running" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
        <svg x-show="!running" class="w-5 h-5 ml-0.5" fill="currentColor" viewBox="0 0 24 24">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </button>

      <button class="w-12 h-12 rounded-xl bg-neutral-800/50 border border-neutral-700/30 flex items-center justify-center text-emerald-400 hover:text-emerald-300 hover:bg-emerald-500/10 hover:border-emerald-500/25 transition-all">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>

      <button class="w-10 h-10 rounded-xl bg-neutral-800/30 border border-neutral-800/40 flex items-center justify-center text-neutral-600 hover:text-red-400 hover:border-red-500/20 hover:bg-red-500/10 transition-all"
              hx-delete="{% url 'tasks:task-detail' task.id %}?date={{ view_date|date:'Y-m-d' }}"
              hx-target="#queue-content"
              hx-swap="innerHTML">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </div>
  </div>
</div>
