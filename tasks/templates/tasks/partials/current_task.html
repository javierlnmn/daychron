
<div
  x-data="timer(
    {% if view_date == today %}{{ task.total_elapsed_seconds }}{% else %}{{ task.elapsed_seconds }}{% endif %},
    {% if view_date == today %}{{ task.is_running|yesno:'true,false' }}{% else %}false{% endif %},
    '{% url 'tasks:task-toggle' task.id %}'
  )"
  class="flex flex-col gap-1 shrink-0"
>
  <h2 class="text-[11px] font-semibold tracking-[0.15em] text-neutral-500 uppercase">Right now</h2>
  
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 max-md:gap-2">
    <div class="flex flex-col justify-between md:self-stretch gap-4 max-md:gap-2">
      <p class="text-lg text-neutral-200 font-medium">{{ task.name }}</p>

      <div class="flex items-center gap-3 {% if view_date != today %}opacity-50 pointer-events-none {% endif %}">
        <button
                {% if view_date == today %}@click="toggle()"{% else %}disabled{% endif %}
                class="w-11 h-11 rounded-xl border flex items-center justify-center transition-all"
                :class="running
                  ? 'bg-cyan-500/15 border-cyan-500/25 text-cyan-400 hover:bg-cyan-500/25'
                  : 'bg-neutral-800/50 border-neutral-700/30 text-neutral-400 hover:text-white hover:bg-neutral-700/60'">
          <svg x-show="running" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
          <svg x-show="!running" class="w-5 h-5 ml-0.5" fill="currentColor" viewBox="0 0 24 24">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </button>

        <button
          type="button"
          {% if view_date != today %}disabled{% endif %}
          hx-delete="{% url 'tasks:task-detail' task.id %}"
          hx-target="#queue-content"
          hx-swap="innerHTML"
          hx-vals='{"date":"{{ view_date|date:"Y-m-d" }}"}'
          class="w-11 h-11 rounded-xl bg-neutral-800/50 border border-neutral-700/30 flex items-center justify-center text-rose-400 hover:text-rose-300 hover:bg-rose-500/10 hover:border-rose-500/25 transition-all"
          aria-label="Delete task"
        >
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 11v6" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M14 11v6" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 7l1 14h10l1-14" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 7V4h6v3" />
          </svg>
        </button>

        <button
          type="button"
          {% if view_date != today %}disabled{% endif %}
          hx-post="{% url 'tasks:task-complete' task.id %}"
          hx-target="#queue-content"
          hx-swap="innerHTML"
          hx-vals='{"date":"{{ view_date|date:"Y-m-d" }}"}'
          class="w-11 h-11 rounded-xl bg-neutral-800/50 border border-neutral-700/30 flex items-center justify-center text-emerald-400 hover:text-emerald-300 hover:bg-emerald-500/10 hover:border-emerald-500/25 transition-all"
        >
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>

        <div x-show="running" x-cloak class="ml-1">
          <span class="relative flex h-2.5 w-2.5">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-cyan-400"></span>
          </span>
        </div>
      </div>
    </div>

    <div class="self-end text-[5.5rem] max-md:text-[5rem] w-72 flex md:justify-end md:-mr-3.5 leading-[65px] tracking-widest transition-colors" style="font-family: 'WDXL Lubrifont TC', sans-serif"
        :class="running ? 'text-cyan-400' : 'text-neutral-500'">
      <span x-text="mm"></span><span class="mx-1" :class="running ? 'text-cyan-400/40' : 'text-neutral-600'">:</span><span x-text="ss"></span>
    </div>

  </div>
</div>
