<div class="pt-2 flex items-center justify-between gap-3">
  <div class="flex items-center gap-2 shrink-0">
    {% if view_date == today %}
    <div class="flex flex-col">
      <button
        type="button"
        hx-post="{% url 'tasks:task-move' task.id %}"
        hx-target="#queue-content"
        hx-swap="innerHTML"
        hx-vals='{"date":"{{ view_date|date:"Y-m-d" }}","direction":"up"}'
        class="p-1 rounded-md text-neutral-500 hover:text-neutral-300 hover:bg-neutral-800/60 transition-colors"
        aria-label="Move up in queue"
      >
        <svg class="size-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/>
        </svg>
      </button>
      <button
        type="button"
        {% if forloop.last %}disabled{% endif %}
        {% if not forloop.last %}
        hx-post="{% url 'tasks:task-move' task.id %}"
        hx-target="#queue-content"
        hx-swap="innerHTML"
        hx-vals='{"date":"{{ view_date|date:"Y-m-d" }}","direction":"down"}'
        {% endif %}
        class="p-1 rounded-md transition-colors {% if forloop.last %}text-neutral-700 cursor-not-allowed{% else %}text-neutral-500 hover:text-neutral-300 hover:bg-neutral-800/60{% endif %}"
        aria-label="Move down in queue"
      >
        <svg class="size-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
    </div>
    {% endif %}
    
    <span class="text-[15px] text-neutral-300 min-w-0 truncate">{{ task.name }}</span>
  </div>

  {% if view_date == today %}
  <button
    type="button"
    hx-delete="{% url 'tasks:task-detail' task.id %}"
    hx-target="#queue-content"
    hx-swap="innerHTML"
    hx-vals='{"date":"{{ view_date|date:"Y-m-d" }}"}'
    class="shrink-0 flex items-center justify-center text-rose-400 hover:text-rose-300 transition-all"
    aria-label="Delete task"
  >
    <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M10 11v6" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M14 11v6" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 7l1 14h10l1-14" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 7V4h6v3" />
    </svg>
  </button>
  {% endif %}
</div>
