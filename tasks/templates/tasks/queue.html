{% extends 'common/_main.html' %}
{% load static %}

{% block content %}
<main
  class="h-svh flex flex-col items-center text-white relative"
>
  <div class="w-full max-w-[560px] lg:max-w-[900px] px-6 pt-8 pb-20 flex-1 flex flex-col min-h-0">
    <div class="flex items-start justify-between mb-8">
      <div>
        <img
          src="{% static 'img/logo-rect_no-bg.png' %}"
          alt="DayChron"
          class="h-6"
        />
        <p id="queue-stats" class="text-[13px] text-neutral-500 mt-1">
          {% include 'tasks/partials/stats.html' %}
        </p>
      </div>
      <div class="flex items-center gap-3 relative">
        <a
          href="?date={{ prev_date|date:'Y-m-d' }}"
          class="text-neutral-500 hover:text-neutral-300 text-xl px-1 transition-colors"
          aria-label="Previous day"
          >&#8249;</a
        >
        <a
          href="{% if view_date == today %}{% url 'tasks:queue' %}{% else %}?date={{ view_date|date:'Y-m-d' }}{% endif %}"
          class="flex items-center gap-1.5 text-cyan-400 text-sm font-medium hover:text-cyan-300 transition-colors"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <path d="M16 2v4M8 2v4M3 10h18" />
          </svg>
          <span class="text-white">
            {% if view_date == today %}Today{% else %}{{ view_date|date:"M j"}}
            {% endif %}
          </span>
        </a>
        <a
          href="?date={{ next_date|date:'Y-m-d' }}"
          class="text-neutral-500 hover:text-neutral-300 text-xl px-1 transition-colors"
          aria-label="Next day"
          >&#8250;</a
        >
      </div>
    </div>

    <div id="queue-content" class="flex-1 flex flex-col gap-6 min-h-0">
      {% include 'tasks/partials/task_list.html' %}
    </div>
  </div>

  <div
    class="fixed bottom-0 left-0 right-0 bg-[#0c0c0e] border-t border-neutral-800/60 z-40"
  >
    <div class="max-w-[560px] mx-auto px-6 h-16 flex items-center">
      <form
        hx-post="{% url 'tasks:task' %}"
        hx-target="#queue-content"
        hx-swap="innerHTML"
        hx-on::after-request="this.reset()"
        class="flex items-center w-full"
      >
        <input type="hidden" name="date" value="{{ view_date|date:'Y-m-d' }}" />
        <span class="text-xl font-light text-neutral-500 leading-none">+</span>
        <input
          type="text"
          name="name"
          placeholder="Add a task..."
          required
          class="flex-1 bg-transparent text-[15px] text-white placeholder-neutral-600 outline-none border-none ring-0 shadow-none focus:outline-none focus:ring-0 focus:shadow-none"
        />
      </form>
    </div>
  </div>
</main>
{% endblock %}
