<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("timer", (elapsed = 0, running = false, toggleUrl = '') => {
      let intervalId = null;

      const pad2 = (n) => String(n).padStart(2, "0");

      const start = (ctx) => {
        if (intervalId) return;
        intervalId = setInterval(() => ctx.elapsed++, 1000);
      };

      const stop = () => {
        if (!intervalId) return;
        clearInterval(intervalId);
        intervalId = null;
      };

      return {
        elapsed,
        running,

        get mm() {
          return pad2(Math.floor(this.elapsed / 60));
        },

        get ss() {
          return pad2(this.elapsed % 60);
        },

        init() {
          if (this.running) start(this);
        },

        destroy() {
          stop();
        },

        toggle() {
          this.running = !this.running;
          this.running ? start(this) : stop();

          const csrf = document.querySelector(
            'meta[name="csrf-token"]',
          ).content;

          fetch(toggleUrl, {
            method: "PATCH",
            headers: { "X-CSRFToken": csrf },
          });
        }
      };
    });
  });
</script>
